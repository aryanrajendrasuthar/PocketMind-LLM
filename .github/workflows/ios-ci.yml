name: iOS CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (iOS)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint — zero warnings
        working-directory: PocketMind
        run: swiftlint --strict

      - name: Build for Simulator
        run: |
          xcodebuild \
            -scheme PocketMind \
            -project PocketMind/PocketMind.xcodeproj \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.0' \
            -configuration Debug \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -scheme PocketMind \
            -project PocketMind/PocketMind.xcodeproj \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.0' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty

      - name: Static Analysis
        run: |
          xcodebuild analyze \
            -scheme PocketMind \
            -project PocketMind/PocketMind.xcodeproj \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.0' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty

      - name: Check for hardcoded secrets (TruffleHog)
        run: |
          pip install trufflehog3
          trufflehog3 --no-history .
