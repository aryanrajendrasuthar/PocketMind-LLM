model_id: "llama32_3b"
display_name: "Llama 3.2 3B Instruct"
huggingface_repo: "meta-llama/Llama-3.2-3B-Instruct"

parameters:
  count: 3_000_000_000
  context_length: 131072
  target_context_length: 4096

quantization:
  method: "Q4_K_M"
  output_format: "gguf"

coreml:
  output_name: "pocketmind_llama32_3b"
  minimum_ios: "17.0"
  compute_units: "ALL"
  precision: "FLOAT16"

hardware:
  min_device: "iPhone 14"
  min_chip: "A15"
  min_ram_gb: 4

size_estimates:
  fp16_gb: 6.0
  int4_gb: 1.8

performance_targets:
  time_to_first_token_sec: 2.5
  min_tokens_per_sec: 7
  max_peak_memory_mb: 2300

manifest:
  version: "1.0.0"
  capabilities:
    - "reasoning"
    - "writing"
    - "code"
    - "summarization"
  offline_limitations:
    - "no_live_data"
    - "no_web_search"
    - "no_real_time_events"
  knowledge_cutoff: "2024-04"
  max_tokens: 512
