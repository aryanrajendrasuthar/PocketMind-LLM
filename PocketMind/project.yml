name: PocketMind
options:
  bundleIdPrefix: com.aryan
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_BITCODE: NO
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

configs:
  Debug: debug
  Release: release

packages:
  SQLCipher:
    url: https://github.com/sqlcipher/sqlcipher
    from: "4.5.0"

targets:
  PocketMind:
    type: application
    platform: iOS
    sources:
      - path: PocketMind
        excludes:
          - "**/*.md"
    info:
      path: PocketMind/Supporting Files/Info.plist
    entitlements:
      path: PocketMind/Supporting Files/PocketMind.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aryan.pocketmind
        INFOPLIST_FILE: PocketMind/Supporting Files/Info.plist
        CODE_SIGN_ENTITLEMENTS: PocketMind/Supporting Files/PocketMind.entitlements
        SWIFT_STRICT_CONCURRENCY: complete
        GCC_TREAT_WARNINGS_AS_ERRORS: YES
        SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
        ENABLE_ADDRESS_SANITIZER: YES
        ENABLE_THREAD_SANITIZER: YES
      configs:
        Release:
          ENABLE_ADDRESS_SANITIZER: NO
          ENABLE_THREAD_SANITIZER: NO
    dependencies:
      - package: SQLCipher

  PocketMindTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PocketMindTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aryan.pocketmind.tests
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - target: PocketMind
