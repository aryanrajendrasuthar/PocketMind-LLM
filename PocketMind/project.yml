name: PocketMind
options:
  bundleIdPrefix: com.aryan
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_BITCODE: NO
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: 3V97P38NY2
    CODE_SIGN_STYLE: Automatic

configs:
  Debug: debug
  Release: release

targets:
  PocketMind:
    type: application
    platform: iOS
    sources:
      - path: PocketMind
        excludes:
          - "**/*.md"
          - "**/*.mlpackage"
      - path: PocketMind/Models/pocketmind_llama32_1b.mlpackage
        type: folder
        buildPhase: resources
    info:
      path: PocketMind/Supporting Files/Info.plist
      generate: false
    entitlements:
      path: PocketMind/Supporting Files/PocketMind.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aryan.pocketmind
        INFOPLIST_FILE: PocketMind/Supporting Files/Info.plist
        CODE_SIGN_ENTITLEMENTS: PocketMind/Supporting Files/PocketMind.entitlements
        SWIFT_STRICT_CONCURRENCY: complete
        GCC_TREAT_WARNINGS_AS_ERRORS: YES
        SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    dependencies: []

  PocketMindTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PocketMindTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aryan.pocketmind.tests
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - target: PocketMind

  PocketMindUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PocketMindUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aryan.pocketmind.uitests
        TEST_TARGET_NAME: PocketMind
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - target: PocketMind
